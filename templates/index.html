<!DOCTYPE html>
<html>
<head>
    <title>Student Management System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            background-color: #f4f4f4;
            padding: 20px;
        }
        h1 {
            color: #185FA5;
            text-align: center;
        }
        form {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        input {
            padding: 8px;
            margin: 5px;
            width: 200px;
        }
        button {
            background-color: #185FA5;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
            border-radius: 8px;
        }
        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }
        th {
            background-color: #185FA5;
            color: white;
        }
        .delete-btn {
            background-color: #B91C1C;
        }
    </style>
</head>
<body>
    <h1>Student Management System</h1>

    <form action="/add" method="POST">
        <input type="text" name="name" placeholder="Student Name" required>
        <input type="number" name="marks" placeholder="Marks (0-100)" required>
        <button type="submit">Add Student</button>
    </form>

    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Marks</th>
            <th>Grade</th>
            <th>Action</th>
        </tr>
        {% for student in students %}
        <tr>
            <td>{{ student[0] }}</td>
            <td>{{ student[1] }}</td>
            <td>{{ student[2] }}</td>
            <td>{{ student[3] }}</td>
            <td>
                <form action="/delete/{{ student[0] }}" method="POST" style="display:inline;">
                    <button type="submit" class="delete-btn">Delete</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
